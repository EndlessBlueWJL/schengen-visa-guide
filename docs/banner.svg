<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" width="720" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B1A2B"/>
      <stop offset="100%" style="stop-color:#5C0E1A"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547"/>
      <stop offset="100%" style="stop-color:#C8A43C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="12" fill="url(#bg)"/>

  <!-- Chinese passport icon (left side) -->
  <g transform="translate(48, 28)">
    <!-- Passport body -->
    <rect x="0" y="0" width="56" height="84" rx="4" fill="#6B1220" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Inner panel -->
    <rect x="12" y="16" width="32" height="24" rx="2" fill="#4A0814" stroke="#E8C547" stroke-width="1" opacity="0.9"/>
    <!-- CHN text -->
    <text x="28" y="31" text-anchor="middle" font-size="8" font-weight="700" fill="#E8C547" font-family="sans-serif" letter-spacing="2">CHN</text>
    <!-- Detail lines -->
    <line x1="16" y1="48" x2="40" y2="48" stroke="#E8C547" stroke-width="1.2" opacity="0.6"/>
    <line x1="16" y1="54" x2="40" y2="54" stroke="#E8C547" stroke-width="1.2" opacity="0.6"/>
    <line x1="16" y1="60" x2="34" y2="60" stroke="#E8C547" stroke-width="1.2" opacity="0.6"/>
    <line x1="16" y1="66" x2="38" y2="66" stroke="#E8C547" stroke-width="1.2" opacity="0.6"/>
    <!-- Bottom chip -->
    <rect x="20" y="73" width="16" height="5" rx="2" fill="#E8C547" opacity="0.35"/>
  </g>

  <!-- Text (right side) -->
  <text x="140" y="56" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    Schengen Visa Guide
  </text>
  <text x="140" y="86" font-family="system-ui, sans-serif" font-size="15" fill="#E8C547" letter-spacing="4" opacity="0.95">
    申 根 签 证 AI Agent 技 能
  </text>

  <!-- Bottom badge -->
  <rect x="140" y="100" width="130" height="20" rx="10" fill="#E8C547" opacity="0.15"/>
  <text x="205" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#E8C547" opacity="0.9">
    v1.1.0 · 6 identities
  </text>
</svg>
