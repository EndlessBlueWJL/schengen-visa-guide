<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 140" width="720" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003399"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="stars" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="140" rx="12" fill="url(#bg)"/>

  <!-- Passport icon (left side) -->
  <g transform="translate(48, 30)">
    <rect x="0" y="0" width="56" height="80" rx="4" fill="#162447" stroke="url(#stars)" stroke-width="2"/>
    <rect x="12" y="14" width="32" height="24" rx="3" fill="#0f3460" stroke="#FFD700" stroke-width="1" opacity="0.8"/>
    <text x="28" y="29" text-anchor="middle" font-size="6" fill="#FFD700" font-family="sans-serif">SCH</text>
    <line x1="16" y1="44" x2="40" y2="44" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="50" x2="40" y2="50" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="56" x2="34" y2="56" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <line x1="16" y1="62" x2="38" y2="62" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <rect x="16" y="68" width="16" height="4" rx="2" fill="#FFD700" opacity="0.4"/>
    <!-- 12 stars in circle -->
    <g opacity="0.7">
      <circle cx="28" cy="40" r="14" fill="none" stroke="#FFD700" stroke-width="0.5" opacity="0.3"/>
      <circle cx="28" cy="26" r="1.2" fill="#FFD700"/><circle cx="28" cy="54" r="1.2" fill="#FFD700"/>
      <circle cx="35" cy="28" r="1.2" fill="#FFD700"/><circle cx="21" cy="28" r="1.2" fill="#FFD700"/>
      <circle cx="38" cy="33" r="1.2" fill="#FFD700"/><circle cx="18" cy="33" r="1.2" fill="#FFD700"/>
      <circle cx="40" cy="40" r="1.2" fill="#FFD700"/><circle cx="16" cy="40" r="1.2" fill="#FFD700"/>
      <circle cx="38" cy="47" r="1.2" fill="#FFD700"/><circle cx="18" cy="47" r="1.2" fill="#FFD700"/>
      <circle cx="35" cy="52" r="1.2" fill="#FFD700"/><circle cx="21" cy="52" r="1.2" fill="#FFD700"/>
    </g>
  </g>

  <!-- Text (right side) -->
  <text x="140" y="56" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFFFFF" letter-spacing="2">
    Schengen Visa Guide
  </text>
  <text x="140" y="86" font-family="system-ui, sans-serif" font-size="15" fill="#FFD700" letter-spacing="4" opacity="0.9">
    申 根 签 证 AI Agent 技 能
  </text>

  <!-- Bottom badge -->
  <rect x="140" y="100" width="130" height="20" rx="10" fill="#FFD700" opacity="0.15"/>
  <text x="205" y="114" text-anchor="middle" font-family="monospace" font-size="10" fill="#FFD700" opacity="0.85">
    v1.1.0 · 6 identities
  </text>
</svg>
